name: Auto Test Proxies with LiteSpeedTest

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 运行
  workflow_dispatch:  # 支持手动触发

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run proxy merge script
        run: python proxy.py

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install LiteSpeedTest
        run: |
          git clone https://github.com/xxf098/LiteSpeedTest.git
          cd LiteSpeedTest
          cp $(go env GOROOT)/misc/wasm/wasm_exec.js ./web/gui/
          npm install --prefix web/gui
          npm run --prefix web/gui build
          GOOS=js GOARCH=wasm go build -o ./web/gui/dist/main.wasm ./wasm
          go build -o lite
          mv lite ../
          cd ..

      - name: Test proxies with LiteSpeedTest
        run: |
          # 创建 LiteSpeedTest 配置文件
          cat > config.json << EOF
          {
            "group": "test",
            "mode": 1,  # speedonly
            "pingmethod": 1,  # tcpping
            "sort": 1,  # 按速度排序
            "concurrency": 10,  # 并发测试 10 个节点
            "testmode": 2,  # ALLTEST
            "timeout": 5000,  # 超时 5 秒
            "speedlimit": 1.0,  # 最低速度 1Mbps
            "output": 3,  # 输出 JSON
            "unique": true  # 去重
          }
          EOF

          # 初始化有效代理 JSON 文件
          echo '[]' > valid_proxies.json

          # 读取 node_urls.txt，循环测试每个 URL
          while IFS= read -r url; do
            if [ -n "$url" ]; then
              echo "Testing URL: $url"
              ./lite --config config.json --test "$url" > test_result.json || true

              # 解析 LiteSpeedTest 输出，提取有效 proxies
              python3 -c "
import json
import yaml
try:
    with open('test_result.json', 'r') as f:
        result = json.load(f)
    valid_proxies = result.get('proxies', []) if isinstance(result, dict) else []
    if valid_proxies:
        with open('valid_proxies.json', 'r+') as f:
            all_valid = json.load(f)
            all_valid.extend(valid_proxies)
            f.seek(0)
            f.truncate()
            json.dump(all_valid, f)
        print(f'Added {len(valid_proxies)} valid proxies from {url}')
    else:
        print(f'No valid proxies found for {url}')
except Exception as e:
    print(f'Error processing {url}: {e}')
              "
              # 避免速率限制
              sleep 5
            fi
          done < node_urls.txt

          # 将 valid_proxies.json 转换为 valid_proxies.yaml
          python3 -c "
import json
import yaml
try:
    with open('valid_proxies.json', 'r') as f:
        proxies = json.load(f)
    if proxies:
        yaml.dump({'proxies': proxies}, open('valid_proxies.yaml', 'w'), default_flow_style=False, allow_unicode=True, sort_keys=False)
        print(f'Generated valid_proxies.yaml with {len(proxies)} proxies')
    else:
        print('No valid proxies found, skipping valid_proxies.yaml generation')
except Exception as e:
    print(f'Error generating valid_proxies.yaml: {e}')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-files
          path: |
            combined_proxies.yaml
            valid_proxies.yaml
            node_urls.txt
            test_result.json
            valid_proxies.json

      - name: Notify on failure
        if: failure()
        run: echo "Proxy test failed - check logs for details."
