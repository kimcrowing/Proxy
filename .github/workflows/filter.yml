name: Auto Process and Test Proxies with LiteSpeedTest

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at UTC 00:00
  workflow_dispatch:  # Allow manual trigger

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run proxy processing script (collect URLs and proxies)
        run: python proxy.py

      - name: Download and prepare LiteSpeedTest release binary
        run: |
          RELEASE_URL="https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v0.15.0.gz"
          echo "Downloading from: $RELEASE_URL"
          curl -L -o lite.gz "$RELEASE_URL" || { echo "Download failed"; exit 1; }
          gunzip lite.gz || { echo "Decompress failed"; exit 1; }
          echo "Files after gunzip:"
          ls -l
          # Check if 'lite' exists
          if [ -f "lite" ]; then
            chmod +x lite
            ./lite -v || { echo "Binary compatibility check failed"; ls -l; exit 1; }
            echo "LiteSpeedTest binary prepared successfully"
          else
            echo "Expected binary 'lite' not found"
            ls -l
            exit 1
          fi

      - name: Test proxies with LiteSpeedTest
        run: |
          set -e
          cat > config.json << EOF
          {
            "group": "test",
            "mode": 1,
            "pingmethod": 1,
            "sort": 1,
            "concurrency": 10,
            "testmode": 2,
            "timeout": 5000,
            "speedlimit": 1.0,
            "outputMode": 3,
            "unique": true
          }
          EOF
          echo '[]' > lite_valid_proxies.json
          while IFS= read -r url; do
            if [ -n "$url" ]; then
              echo "Testing URL: $url"
              ./lite --config config.json --test "$url" > test_result.json || true
              cat test_result.json || echo "Failed to read test_result.json"
              python3 -c '
                import json
                try:
                    with open("test_result.json", "r") as f:
                        result = json.load(f)
                    print("Debug JSON:", json.dumps(result, indent=2))
                    valid_proxies = result.get("proxies", []) if isinstance(result, dict) else []
                    if valid_proxies:
                        with open("lite_valid_proxies.json", "r+") as f:
                            all_valid = json.load(f)
                            all_valid.extend(valid_proxies)
                            f.seek(0)
                            f.truncate()
                            json.dump(all_valid, f)
                        print(f"Added {len(valid_proxies)} valid proxies from {url}")
                    else:
                        print(f"No valid proxies found for {url}")
                except Exception as e:
                    print(f"Error processing {url}: {e}")
              '
              sleep 5
            fi
          done < node_urls.txt

      - name: Process valid proxies (country query and renaming)
        run: python proxy.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config core.ignorecase false
          git add valid_proxies.yaml node_urls.txt lite_valid_proxies.json test_result.json
          git commit -m "Update proxy configurations" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-files
          path: |
            valid_proxies.yaml
            lite_valid_proxies.json
            node_urls.txt
            test_result.json

      - name: Notify on failure
        if: failure()
        run: echo "Proxy processing or testing failed - check logs for details."
