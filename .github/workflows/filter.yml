name: Proxy Node Initial Screening

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  screen-proxies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget python3 python3-pip
          pip3 install pyyaml  # 用于处理 YAML 文件

      - name: Download LiteSpeedTest binary
        run: |
          wget https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v3-v0.15.0.gz
          gunzip lite-linux-amd64-v3-v0.15.0.gz
          chmod +x lite-linux-amd64-v3-v0.15.0
          sudo mv lite-linux-amd64-v3-v0.15.0 /usr/local/bin/lite

      - name: Convert YAML to LiteSpeedTest input
        run: |
          python3 -c "
          import yaml, base64
          with open('combined_proxies.yaml', 'r') as f:
              data = yaml.safe_load(f)
          proxies = data.get('proxies', [])
          clash_yaml = yaml.dump({'proxies': proxies}, allow_unicode=True)
          with open('proxies.b64', 'w') as f:
              f.write(base64.b64encode(clash_yaml.encode('utf-8')).decode('utf-8'))
          "

      - name: Create LiteSpeedTest config
        run: |
          cat > config.json << EOF
          {
            "group": "screening",
            "speedtestMode": "pingonly",
            "pingMethod": "googleping",
            "sortMethod": "rspeed",
            "concurrency": 10,
            "testMode": 2,
            "timeout": 10,
            "language": "en",
            "unique": true,
            "outputMode": 1
          }
          EOF

      - name: Test proxies with LiteSpeedTest
        run: |
          ./lite --config config.json --test file://proxies.b64 > valid_proxies.b64 2> test_error.log || echo "Test failed, check test_error.log"

      - name: Debug Base64 output
        run: |
          echo "Contents of valid_proxies.b64:"
          cat valid_proxies.b64
          echo "Checking if valid_proxies.b64 is valid Base64:"
          base64 -d valid_proxies.b64 > /dev/null && echo "Valid Base64" || echo "Invalid Base64"

      - name: Convert output to YAML
        run: |
          python3 -c "
          import yaml, base64
          try:
              with open('valid_proxies.b64', 'r', encoding='utf-8') as f:
                  b64_data = f.read().strip()
              # Decode Base64, handling potential errors
              try:
                  decoded_data = base64.b64decode(b64_data, validate=True)
              except Exception as e:
                  print(f'Base64 decode error: {e}')
                  exit(1)
              # Try decoding as UTF-8, fallback to latin1 if needed
              try:
                  yaml_data = decoded_data.decode('utf-8')
              except UnicodeDecodeError:
                  print('UTF-8 decode failed, trying latin1')
                  yaml_data = decoded_data.decode('latin1')
              # Validate YAML
              try:
                  yaml.safe_load(yaml_data)
              except yaml.YAMLError as e:
                  print(f'YAML parse error: {e}')
                  exit(1)
              with open('valid_proxies.yaml', 'w', encoding='utf-8') as f:
                  f.write(yaml_data)
          except Exception as e:
              print(f'Error processing file: {e}')
              exit(1)
          "

      - name: Check output
        run: |
          if [ ! -s valid_proxies.yaml ]; then
            echo "No valid proxies found!"
            exit 1
          fi
          echo "Valid proxies written to valid_proxies.yaml"

      - name: Commit valid proxies back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update valid proxy nodes - $(date +'%Y-%m-%d %H:%M')"
          file_pattern: "valid_proxies.yaml"
