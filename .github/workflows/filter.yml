name: Auto Process and Test Proxies with LiteSpeedTest

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 运行
  workflow_dispatch:  # 允许手动触发

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: 运行代理处理脚本（收集 URL 和代理）
        run: python proxy.py

      - name: 下载并准备 LiteSpeedTest 二进制文件
        run: |
          RELEASE_URL="https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v0.15.0.gz"
          echo "正在下载: $RELEASE_URL"
          curl -L -o lite.gz "$RELEASE_URL" || { echo "下载失败"; exit 1; }
          gunzip lite.gz || { echo "解压失败"; exit 1; }
          echo "解压后的文件:"
          ls -l
          if [ -f "lite" ]; then
            chmod +x lite
            ./lite -v || { echo "二进制兼容性检查失败"; ls -l; exit 1; }
            echo "LiteSpeedTest 二进制文件准备成功"
          else
            echo "未找到预期的二进制文件 'lite'"
            ls -l
            exit 1
          fi

      - name: 使用 LiteSpeedTest 测试代理
        run: |
          cat > config.json << EOF
          {
            "group": "test",
            "mode": 1,
            "pingmethod": 1,
            "sort": 1,
            "concurrency": 10,
            "testmode": 2,
            "timeout": 5000,
            "speedlimit": 1.0,
            "outputMode": 3,
            "unique": true
          }
          EOF
          echo '[]' > lite_valid_proxies.json
          while IFS= read -r url; do
            if [ -n "$url" ]; then
              echo "测试 URL: $url"
              ./lite --config config.json --test "$url" > test_result.json || true
              cat test_result.json || echo "无法读取 test_result.json"
              python process_json.py "$url"
              sleep 5
            fi
          done < node_urls.txt

      - name: 处理有效代理（国家查询和重命名）
        run: python proxy.py

      - name: 提交并推送更改
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config core.ignorecase false
          git add valid_proxies.yaml node_urls.txt lite_valid_proxies.json test_result.json process_json.py
          git commit -m "更新代理配置" || echo "没有更改需要提交"
          git push || echo "没有更改需要推送"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: proxy-files
          path: |
            valid_proxies.yaml
            lite_valid_proxies.json
            node_urls.txt
            test_result.json

      - name: 失败时通知
        if: failure()
        run: echo "代理处理或测试失败 - 请检查日志以获取详细信息。"
