name: Clash-SpeedTest 节点测速筛选

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  speedtest:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 设置 Go 环境
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: 使用 go install 安装 clash-speedtest
        run: |
          go install github.com/faceair/clash-speedtest@latest
          # 将 Go 安装目录添加到 PATH 中
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: 运行测速并筛选节点
        run: |
          # 使用仓库根目录下的 combined_proxies.yaml 作为输入配置文件，
          # 筛选条件：延迟低于 800ms 且下载速度大于 5MB/s
          clash-speedtest -c "combined_proxies.yaml" -output "nodes_filtered.yaml" -download-size 5 -max-latency 5000ms -min-speed 0

      - name: 提交更新后的配置文件
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add nodes_filtered.yaml
          git commit -m "Update nodes after Clash-SpeedTest filtering" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
