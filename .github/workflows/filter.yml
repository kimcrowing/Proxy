name: Proxy Node Initial Screening

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  screen-proxies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget python3 python3-pip
          pip3 install pyyaml

      - name: Download LiteSpeedTest binary
        run: |
          wget https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v3-v0.15.0.gz
          gunzip lite-linux-amd64-v3-v0.15.0.gz
          chmod +x lite-linux-amd64-v3-v0.15.0
          sudo mv lite-linux-amd64-v3-v0.15.0 /usr/local/bin/lite

      - name: Validate and Convert YAML to LiteSpeedTest input
        run: |
          python3 -c "
          import yaml, base64
          with open('combined_proxies.yaml', 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
          proxies = data.get('proxies', [])
          if not proxies:
              print('No proxies found!')
              exit(1)
          # 添加最小 proxy-groups，使其成为完整 Clash 订阅
          full_config = {
              'proxies': proxies,
              'proxy-groups': [{'name': 'select', 'type': 'select', 'proxies': [p['name'] for p in proxies]}]
          }
          clash_yaml = yaml.dump(full_config, allow_unicode=True, default_flow_style=False)
          b64_encoded = base64.b64encode(clash_yaml.encode('utf-8')).decode('utf-8')
          with open('proxies.b64', 'w', encoding='utf-8') as f:
              f.write(b64_encoded)
          print(f'Generated Base64 for {len(proxies)} proxies')
          "

      - name: Debug input Base64
        run: |
          echo "Sample of proxies.b64 (first 200 chars):"
          head -c 200 proxies.b64
          base64 -d proxies.b64 > /dev/null && echo "Valid Base64 input" || echo "Invalid Base64 input"

      - name: Create LiteSpeedTest config
        run: |
          cat > config.json << EOF
          {
            "group": "screening",
            "speedtestMode": "pingonly",
            "pingMethod": "tcpping",
            "sortMethod": "rspeed",
            "concurrency": 3,  // 进一步降低并发
            "testMode": 2,
            "timeout": 20,     // 增加超时
            "language": "en",
            "unique": true,
            "outputMode": 0    // 0: base64 输出
          }
          EOF

      - name: Test proxies with LiteSpeedTest
        run: |
          # 直接传递 Base64 字符串作为订阅输入
          b64_input=\$(cat proxies.b64)
          ./lite --config config.json --test "\$b64_input" > valid_proxies.b64 2> test_error.log || echo "Test failed, check test_error.log"

      - name: Debug output
        run: |
          echo "Contents of test_error.log:"
          cat test_error.log
          echo "Contents of valid_proxies.b64 (first 500 chars):"
          head -c 500 valid_proxies.b64

      - name: Convert output to YAML (if valid)
        run: |
          python3 -c "
          import yaml, base64
          try:
              with open('valid_proxies.b64', 'r', encoding='utf-8') as f:
                  b64_data = f.read().strip()
              if not b64_data or 'error' in b64_data.lower():
                  print('Output invalid or empty')
                  exit(1)
              decoded_data = base64.b64decode(b64_data, validate=True)
              yaml_data = decoded_data.decode('utf-8-sig')
              parsed = yaml.safe_load(yaml_data)
              if not parsed or 'proxies' not in parsed:
                  print('Invalid YAML structure')
                  exit(1)
              with open('valid_proxies.yaml', 'w', encoding='utf-8') as f:
                  yaml.dump(parsed, f, allow_unicode=True, default_flow_style=False)
              print('Successfully converted to valid_proxies.yaml')
          except Exception as e:
              print(f'Conversion error: {e}')
              exit(1)
          "

      - name: Check and Commit
        run: |
          if [ ! -s valid_proxies.yaml ]; then
            echo "No valid proxies! Check logs."
            exit 1
          fi
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update valid proxy nodes - $(date +'%Y-%m-%d %H:%M')"
          file_pattern: "valid_proxies.yaml"
