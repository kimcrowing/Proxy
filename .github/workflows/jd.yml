name: Copy jd files

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */3 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'https://github.com/miantj/jd_Scripts.git'

      - uses: actions/filter-files@v4
        with:
          files: |
            **/*.js
            **/*.py
          filters:
            - type=file
            - name='**/*.js'
              age=+3d
            - name='**/*.py'
              age=+3d

      - uses: actions/copy-files@v4
        with:
          source_path: ${{ github.workspace }}
          destination_path: ${{ github.workspace }}\\ql
