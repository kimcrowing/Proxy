name: Copy jd files

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */3 * *'

jobs:
  copy-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          repository: 'other-repo-owner/other-repo-name'
          token: ${{ secrets.GH_PAT }} # 需要有足够权限的个人访问令牌

      - name: Find JS and PY files updated in the last 3 days
        run: |
          find . -name '*.js' -o -name '*.py' -type f -mtime -3 > recent_files.txt

      - name: Copy files to ql directory
        run: |
          mkdir -p ${{ github.workspace }}/ql
          cat recent_files.txt | xargs -I {} cp {} ${{ github.workspace }}/ql/

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: ql
          branch: 'master' # 或者是您想要推送到的分支
