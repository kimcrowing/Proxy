name: Copy jd files to ql

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */3 * *'

jobs:
  copy-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Checkout other repository
        uses: actions/checkout@v4
        with:
          repository: 'miantj/jd_Scripts'
          path: 'other-repo'
          
      - name: Find JS and PY files updated in the last 3 days in the other repository
        run: |
          cd other-repo
          find . -maxdepth 1 -name '*.js' -o -name '*.py' -type f -mtime -3 > recent_files.txt
          cat recent_files.txt # 这将显示文件列表以确保它们被找到

      - name: Copy files to ql directory in the current repository
        run: |
          while IFS= read -r file; do
            cp "other-repo/$file" ${{ github.workspace }}/ql/
          done < other-repo/recent_files.txt
      - name: Commit Changes
        run: |
          git config core.ignorecase false
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add ql/*
          git commit -m "Updated at $(date '+%Y-%m-%d %H:%M:%S')"
          git push          
