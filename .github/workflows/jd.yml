name: Proxy Integration

on:
  push:
    branches:
      - master  # 当主分支发生变化时触发工作流
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  integrate_proxies:
    runs-on: ubuntu-latest  # 使用 Ubuntu 环境

    steps:
    # 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'  # 设置 Python 版本

    # 安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml

    # 运行 Python 脚本处理代理配置
    - name: Process proxy configurations
      run: |
        python process_proxies.py

    # 上传合并后的代理配置
    - name: Upload combined proxies
      uses: actions/upload-artifact@v4
      with:
        name: combined_proxies
        path: combined_proxies.yaml
